<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Yourself - Urban Mowgli Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fdff;
            --text: #1a1a2e;
            --accent: #5e60ce;
            --accent-light: #8b8df1;
            --success: #48cae4;
            --card: #ffffff;
            --shadow: 0 10px 30px rgba(94,96,206,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #fffce8);
            color: var(--text);
            line-height: 1.7;
            padding: 15px;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        header {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        h1 { 
            font-size: 3.5rem; 
            margin-bottom: 15px; 
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .subtitle { 
            font-size: 1.4rem; 
            opacity: 0.95; 
            margin-bottom: 30px;
        }
        
        main { padding: 40px 25px; }
        h2 { 
            font-size: 2rem; 
            color: var(--accent); 
            margin: 40px 0 30px; 
            position: relative; 
            padding-bottom: 10px; 
        }
        h2::after { 
            content: ''; 
            position: absolute; 
            width: 70px; 
            height: 4px; 
            background: var(--success); 
            bottom: 0; 
            left: 0; 
            border-radius: 2px; 
        }
        
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        .quiz-card {
            background: linear-gradient(135deg, #f8fdff, #ffffff);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border-left: 5px solid var(--accent);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .quiz-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-left-color: var(--success);
        }
        
        .quiz-card a {
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .quiz-card h3 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 1.3rem;
            transition: color 0.3s;
        }
        
        .quiz-card:hover h3 {
            color: var(--success);
        }
        
        .quiz-card p {
            font-size: 0.95rem;
            color: #666;
            flex-grow: 1;
            margin-bottom: 15px;
        }
        
        .quiz-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .btn-open {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            margin-top: auto;
        }
        
        .btn-open:hover {
            background: var(--success);
            transform: translateX(5px);
        }
        
        .categories {
            margin: 50px 0;
        }
        
        .category-section {
            margin-bottom: 45px;
        }
        
        .category-title {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
        }
        
        .search-box {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }
        
        .search-box input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid var(--accent);
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            font-family: 'Poppins', sans-serif;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--success);
            box-shadow: 0 0 10px rgba(72, 202, 228, 0.3);
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2rem;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.6rem; }
            .quiz-grid {
                grid-template-columns: 1fr;
            }
            header {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Test Yourself</h1>
            <p class="subtitle">Interactive Quizzes & Learning Modules<br>Master AI, Technology & Digital Skills</p>
        </header>
        
        <main>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search quizzes..." onkeyup="filterQuizzes()">
            </div>
            
            <div id="quizzesContainer" class="categories">
                <!-- Quizzes will be populated here -->
            </div>
            
            <div id="noResults" class="no-results" style="display:none;">
                No quizzes found. Try a different search term.
            </div>
        </main>
        
        <footer>
            <p>🐒 Urban Mowgli - AI for ALL | Learn at your own pace</p>
        </footer>
    </div>

    <script>
        const quizzes = [
            // AI & Prompting
            { title: 'Prompting Template 1', url: 'Promting-template-1-%20learn.html', category: 'Prompting', icon: '🎯' },
            { title: 'Prompting Template 2', url: 'Promting-template-2-%20learn.HTML', category: 'Prompting', icon: '🎯' },
            { title: 'Prompting Strategies', url: 'prompting-strategies-COT-TOT-ReAct-DPS-RAG.html', category: 'Prompting', icon: '🧠' },
            { title: 'Prompting Holiday Example', url: 'prompting-strategies-holiday-example-COT-TOT-ReAct-DPS-RAG.html', category: 'Prompting', icon: '🏖️' },
            { title: 'A Template for Crafting Prompts', url: 'A%20template%20for%20crafting%20prompts%20and%20learning%20to%20structure%20templates.html', category: 'Prompting', icon: '📝' },
            { title: 'Learning to Structure Templates', url: 'learning%20to%20structure%20templates.html', category: 'Prompting', icon: '📚' },
            { title: 'Mixture of Experts', url: 'MoE.html', category: 'AI Concepts', icon: '⚙️' },
            { title: 'Intelligence Quiz', url: 'Intelligence.html', category: 'AI Concepts', icon: '🧠' },
            { title: 'What is Prompt Engineering', url: 'Promting-template-1-%20learn.html', category: 'Prompting', icon: '🔧' },
            
            // IT & Computer Skills
            { title: 'Hacking Onto a Machine', url: 'hacking-onto-a-machine-draft.html', category: 'IT Skills', icon: '💻' },
            { title: 'Computer Parts', url: 'computer-parts.html', category: 'IT Skills', icon: '🖥️' },
            { title: 'Internet Basics', url: 'internet.html', category: 'IT Skills', icon: '🌐' },
            { title: 'Windows Shortcuts', url: 'windows-shortcuts.html', category: 'IT Skills', icon: '⌨️' },
            { title: 'Excel Navigation Basics', url: 'Excel-navigation-basics.html', category: 'IT Skills', icon: '📊' },
            
            // Search & Research
            { title: 'Google Search Operators', url: 'google-search-operators.html', category: 'Research', icon: '🔍' },
            { title: 'YouTube Task', url: 'youtube-task.html', category: 'Research', icon: '📹' },
            
            // Specialized Topics
            { title: 'A-4ALL', url: 'A-4ALL.html', category: 'Specialized', icon: '📖' },
            { title: 'IT4All', url: 'IT4All.html', category: 'Specialized', icon: '💡' },
            { title: 'Tracker (Hummingbird)', url: 'Tracker-hamming-bird.html', category: 'Specialized', icon: '🐦' },
            { title: 'Webpage Builder v2', url: 'Webpage-builder-version-2.html', category: 'Projects', icon: '🏗️' },
            
            // Comprehensive Quizzes
            { title: 'Revision Quiz 2026', url: 'Revision-quiz-2026.html', category: 'Comprehensive', icon: '📋' },
            { title: 'Week 5 Prompting Test', url: 'TEST-WEEK%205-PROMPTING.HTML', category: 'Tests', icon: '✏️' },
        ];

        function renderQuizzes(filter = '') {
            const container = document.getElementById('quizzesContainer');
            const noResults = document.getElementById('noResults');
            
            // Group by category
            const grouped = {};
            quizzes.forEach(quiz => {
                if (filter === '' || quiz.title.toLowerCase().includes(filter.toLowerCase()) || quiz.category.toLowerCase().includes(filter.toLowerCase())) {
                    if (!grouped[quiz.category]) grouped[quiz.category] = [];
                    grouped[quiz.category].push(quiz);
                }
            });
            
            if (Object.keys(grouped).length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            let html = '';
            
            Object.keys(grouped).sort().forEach(category => {
                html += `<div class="category-section"><div class="category-title">📌 ${category}</div><div class="quiz-grid">`;
                grouped[category].forEach(quiz => {
                    html += `
                        <div class="quiz-card">
                            <a href="${quiz.url}" target="_blank" rel="noopener noreferrer">
                                <div class="quiz-icon">${quiz.icon}</div>
                                <h3>${quiz.title}</h3>
                                <p>Take this quiz and test your knowledge</p>
                                <span class="btn-open">Start Quiz →</span>
                            </a>
                        </div>
                    `;
                });
                html += '</div></div>';
            });
            
            container.innerHTML = html;
        }

        function filterQuizzes() {
            const searchTerm = document.getElementById('searchInput').value;
            renderQuizzes(searchTerm);
        }

        // Initial render
        renderQuizzes();
    </script>
</body>
</html>
