<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Learn Google Search Skills</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #FFF5E6; min-height: 100vh; padding: 10px; font-size: 16px; }
    .app { max-width: 500px; margin: 0 auto; background: white; border-radius: 25px; padding: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
    .header { background: #4285F4; color: white; padding: 18px; border-radius: 20px; text-align: center; margin-bottom: 15px; font-size: 1.3em; font-weight: bold; }
    .header-purple { background: #800080; color: white; padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 12px; font-size: 1em; font-weight: bold; }
    .btn { background: #800080; color: white; border: none; padding: 14px 20px; border-radius: 30px; font-size: 1.05em; font-weight: bold; width: 100%; margin: 7px 0; cursor: pointer; }
    .btn-orange { background: #FF8C00; }
    .btn-green { background: #228B22; }
    .btn-blue { background: #4285F4; }
    .btn:active { opacity: 0.85; transform: scale(0.97); }
    .input-box, select { width: 100%; padding: 14px; border: 3px solid #800080; border-radius: 30px; font-size: 1.05em; margin: 7px 0; background: white; }
    select { border-color: #4285F4; }
    .question-box { background: #F5E6FF; padding: 18px; border-radius: 20px; margin: 12px 0; border: 3px solid #800080; }
    .question-text { font-size: 1.2em; font-weight: bold; margin: 10px 0; color: #333; line-height: 1.4; }
    .option-btn { background: white; border: 2px solid #4285F4; padding: 13px 15px; border-radius: 15px; margin: 6px 0; font-size: 1em; text-align: left; cursor: pointer; width: 100%; display: block; font-family: monospace; }
    .option-btn.selected { background: #4285F4; color: white; border-color: #800080; font-weight: bold; }
    .feedback { padding: 12px; margin: 10px 0; border-radius: 12px; font-weight: bold; text-align: center; }
    .correct { background: #90EE90; color: #006400; }
    .wrong { background: #FFB6C1; color: #8B0000; }
    .learn { background: #E8F0FE; border-left: 4px solid #4285F4; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 0.95em; }
    .results { text-align: center; padding: 15px; }
    .big-number { font-size: 2.5em; font-weight: bold; color: #4285F4; }
    .badge { display: inline-block; background: #4285F4; color: white; padding: 5px 14px; border-radius: 20px; font-weight: bold; font-size: 0.9em; margin: 3px; }
    .badge-purple { background: #800080; }
    .progress-bar { background: #e0e0e0; border-radius: 10px; height: 10px; margin: 8px 0; overflow: hidden; }
    .progress-fill { background: #4285F4; height: 100%; transition: width 0.3s; border-radius: 10px; }
    .timer { font-size: 1em; font-weight: bold; color: #FF8C00; text-align: right; padding: 5px; }
    .operator-box { background: #1a1a1a; color: #4EC94E; padding: 6px 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-weight: bold; display: inline-block; margin: 2px; font-size: 1.1em; }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const QUESTION_BANK = {
  Beginner: [
    {type:'mo', text:'What does putting quotes around words do?', options:['Searches exact phrase','Makes text bigger','Adds emphasis','Nothing different'], answer:'Searches exact phrase', explanation:'"climate change" finds pages with exactly that phrase together.'},
    {type:'tf', text:'Using fewer words usually gives better search results', answer:'False', explanation:'More specific words help find exactly what you need.'},
    {type:'fg', text:'To exclude a word from results, use the ___ sign before it', answer:'Minus', explanation:'Example: jaguar -car finds the animal, not the vehicle.'},
    {type:'mo', text:'What does site:example.com do?', options:['Search only that website','Block that website','Make website faster','Translate website'], answer:'Search only that website', explanation:'site: limits results to pages from that domain only.'},
    {type:'tf', text:'Google ignores small words like "the" and "a"', answer:'True', explanation:'Stop words are usually ignored unless in quotes.'},
    {type:'fg', text:'To find a specific file type, use the operator ___', answer:'filetype:', explanation:'Example: filetype:pdf climate report finds PDF documents.'},
    {type:'mo', text:'Which search finds pages about cats OR dogs?', options:['cats OR dogs','cats AND dogs','cats dogs','"cats dogs"'], answer:'cats OR dogs', explanation:'OR (capital letters) finds pages with either word.'},
    {type:'tf', text:'You can search for images by uploading one', answer:'True', explanation:'Reverse image search finds similar or matching images.'},
    {type:'fg', text:'The * symbol acts as a ___ in search queries', answer:'Wildcard', explanation:'Example: "best * in the world" matches any word in that position.'},
    {type:'mo', text:'What does define:word do?', options:['Shows definition of the word','Translates the word','Deletes the word','Highlights the word'], answer:'Shows definition of the word', explanation:'define:serendipity shows dictionary definitions at top of results.'},
    {type:'tf', text:'Weather searches work without any operators', answer:'True', explanation:'Just type "weather London" to see current conditions.'},
    {type:'fg', text:'To search a range of numbers, use ___ between them', answer:'..', explanation:'Example: laptop $500..$800 finds products in that price range.'},
    {type:'mo', text:'What does related:website.com show?', options:['Similar websites','Website errors','Website speed','Website owner'], answer:'Similar websites', explanation:'related: finds websites similar to the one you specify.'},
    {type:'tf', text:'Google can do math calculations directly', answer:'True', explanation:'Type "25*4" or "sqrt(144)" in the search box for instant answers.'},
    {type:'fg', text:'To find pages that link to a website, use ___', answer:'link:', explanation:'link:example.com shows pages that reference that URL.'},
  ],
  Intermediate: [
    {type:'mo', text:'What does intitle:word search for?', options:['Word in page title','Word in URL','Word in footer','Word in images'], answer:'Word in page title', explanation:'intitle: finds pages with that word in the HTML title tag.'},
    {type:'tf', text:'You can combine operators like site: AND filetype:', answer:'True', explanation:'Example: site:gov filetype:pdf "climate report" is very powerful.'},
    {type:'fg', text:'The operator to find words in URLs is ___', answer:'inurl:', explanation:'inurl:contact finds pages with "contact" in the web address.'},
    {type:'mo', text:'What does AROUND(X) do?', options:['Words within X words of each other','Search in a radius','Approximate matches','Translation'], answer:'Words within X words of each other', explanation:'"apple AROUND(3) pie" finds these words close together.'},
    {type:'tf', text:'Google search supports Boolean operators', answer:'True', explanation:'AND, OR, NOT work in Google searches (OR must be uppercase).'},
    {type:'fg', text:'To find pages updated in the last year, use the ___ tool', answer:'Tools', explanation:'Click Tools under search bar, then "Any time" to filter by date.'},
    {type:'mo', text:'Which search finds only educational sites?', options:['site:.edu topic','site:.com topic','topic education','school topic'], answer:'site:.edu topic', explanation:'.edu domains are US educational institutions.'},
    {type:'tf', text:'Cache: shows Google stored copy of a page', answer:'True', explanation:'cache:example.com shows the version Google has saved.'},
    {type:'fg', text:'The ___ operator searches page body text only', answer:'intext:', explanation:'intext: finds words in the visible page content, not titles or links.'},
    {type:'mo', text:'What is the benefit of using OR in searches?', options:['Find alternatives in one search','Make search faster','Filter bad results','Translate results'], answer:'Find alternatives in one search', explanation:'(pizza OR pasta) recipe finds results with either food.'},
    {type:'tf', text:'Parentheses group search terms together', answer:'True', explanation:'(cats OR dogs) adoption groups the OR before other terms.'},
    {type:'fg', text:'To search within a price range, use ___ between values', answer:'..', explanation:'$50..$100 works for any number ranges, not just prices.'},
    {type:'mo', text:'What does location: operator do?', options:['Search news from a place','Find your location','Map directions','Weather only'], answer:'Search news from a place', explanation:'location: filters Google News results by geographic area.'},
    {type:'tf', text:'Google Scholar uses the same operators as Google', answer:'True', explanation:'Most search operators work in Scholar, Images, and News too.'},
    {type:'fg', text:'The ___ feature lets you search by speaking', answer:'Voice', explanation:'Click the microphone icon in Google search to speak your query.'},
  ],
  Advanced: [
    {type:'mo', text:'What is a Google Dork?', options:['Advanced search to find vulnerabilities','A Google employee','A type of virus','A browser extension'], answer:'Advanced search to find vulnerabilities', explanation:'Google dorking uses advanced operators to find exposed sensitive data.'},
    {type:'tf', text:'The allinurl: operator searches multiple words in URLs', answer:'True', explanation:'allinurl: combines multiple inurl: searches into one.'},
    {type:'fg', text:'To find pages that are NOT from a domain, use ___', answer:'-site:', explanation:'-site:wikipedia.org removes Wikipedia from your results.'},
    {type:'mo', text:'What does source: operator do in Google News?', options:['Filter by news source','Show original source','Find citations','Check facts'], answer:'Filter by news source', explanation:'source:BBC shows only news articles from the BBC.'},
    {type:'tf', text:'Google Alerts use search operators for monitoring', answer:'True', explanation:'Set up alerts with operators to track specific topics automatically.'},
    {type:'fg', text:'The ___ operator finds pages with specific anchor text', answer:'inanchor:', explanation:'inanchor: searches for words used in links pointing to pages.'},
    {type:'mo', text:'What is the purpose of numrange: operator?', options:['Search numeric ranges','Count pages','Number results','Limit pages'], answer:'Search numeric ranges', explanation:'numrange:2010-2020 is similar to using 2010..2020.'},
    {type:'tf', text:'Google Custom Search API supports all operators', answer:'True', explanation:'Programmatic search can use operators for precise results.'},
    {type:'fg', text:'To search for social media profiles, use site:twitter.com ___', answer:'intext:', explanation:'site:twitter.com intext:"software engineer" finds profiles.'},
    {type:'mo', text:'What does allintext: do?', options:['All words must be in page text','Search all languages','Include all results','Translate all text'], answer:'All words must be in page text', explanation:'allintext: requires every word to appear in the page body.'},
    {type:'tf', text:'You can search for exact file names with operators', answer:'True', explanation:'Combine filetype: with intitle: for precise document searches.'},
    {type:'fg', text:'The ___ search feature uses AI to answer questions directly', answer:'Featured snippet', explanation:'Google extracts answers from pages to show at the top.'},
    {type:'mo', text:'How do you find unsecured directories?', options:['intitle:"index of"','site:secure','filetype:locked','inurl:password'], answer:'intitle:"index of"', explanation:'This finds open directory listings (use ethically only).'},
    {type:'tf', text:'Google removes all results when using -site:', answer:'False', explanation:'It only removes results from that specific domain.'},
    {type:'fg', text:'The operator to search by image size is ___', answer:'imagesize:', explanation:'imagesize:1920x1080 finds images with specific dimensions.'},
  ],
  Expert: [
    {type:'mo', text:'What is the purpose of the AROUND operator?', options:['Proximity search within text','Geographic radius search','Approximate matches','Translation tool'], answer:'Proximity search within text', explanation:'AROUND specifies maximum word distance between terms.'},
    {type:'tf', text:'Google dorking can find exposed database backups', answer:'True', explanation:'Operators like filetype:sql inurl:backup find unprotected data.'},
    {type:'fg', text:'The ___ operator restricts search to a specific language', answer:'lr=', explanation:'lr=lang_fr searches only French language pages.'},
    {type:'mo', text:'What does the Info: operator show?', options:['Information Google has about a page','Personal info','Server info','Contact details'], answer:'Information Google has about a page', explanation:'info:example.com shows cached, similar, and linking pages.'},
    {type:'tf', text:'Google operators work differently across country domains', answer:'True', explanation:'Some operators behave differently on google.co.uk vs google.com.'},
    {type:'fg', text:'To search within a date range in Google News, use ___', answer:'daterange:', explanation:'daterange:2459123-2459150 uses Julian date format.'},
    {type:'mo', text:'What is the key advantage of the site: operator in security?', options:['Find exposed sensitive files','Speed up browsing','Block malicious sites','Encrypt searches'], answer:'Find exposed sensitive files', explanation:'Security researchers use it to find unintentionally public files.'},
    {type:'tf', text:'Google removed the + operator for mandatory terms', answer:'True', explanation:'The + operator was replaced by quotes for exact matches.'},
    {type:'fg', text:'The ___ operator searches for words in page titles only', answer:'allintitle:', explanation:'allintitle: requires every word in the page title.'},
    {type:'mo', text:'What is the purpose of stocks: operator?', options:['Show stock market data','Search inventory','Find stores','Check prices'], answer:'Show stock market data', explanation:'stocks:AAPL shows financial information for Apple.'},
    {type:'tf', text:'Google operators can be used for OSINT investigations', answer:'True', explanation:'Open Source Intelligence uses advanced search techniques legally.'},
    {type:'fg', text:'The ___ parameter limits results to a specific country', answer:'cr=', explanation:'cr=countryUS shows only results from the United States.'},
    {type:'mo', text:'What does the map: operator do?', options:['Force map results display','Search for maps','Find addresses','Get directions'], answer:'Force map results display', explanation:'map: forces Google to show map results for a location.'},
    {type:'tf', text:'All Google operators are documented publicly', answer:'False', explanation:'Some operators are unofficial or undocumented but still work.'},
    {type:'fg', text:'To find pages with specific meta tags, use ___', answer:'inmeta:', explanation:'inmeta: searches HTML meta tag content (less common now).'},
  ]
};

let state = {
  userName: '',
  currentLevel: 'Beginner',
  questions: [],
  currentIndex: 0,
  answers: [],
  startTime: 0,
  questionStartTime: 0,
  retryMode: false,
  selectedOption: '',
};

function selectQuestions(level) {
  const bank = QUESTION_BANK[level];
  const shuffled = [...bank].sort(() => Math.random() - 0.5);
  const tf = shuffled.filter(q => q.type === 'tf').slice(0, 3);
  const fg = shuffled.filter(q => q.type === 'fg').slice(0, 2);
  const mo = shuffled.filter(q => q.type === 'mo').slice(0, 5);
  let selected = [...tf, ...fg, ...mo];
  if (selected.length < 10) {
    const remaining = shuffled.filter(q => !selected.includes(q));
    selected = [...selected, ...remaining].slice(0, 10);
  }
  return selected.sort(() => Math.random() - 0.5).map((q, i) => ({...q, id: i}));
}

function renderWelcome() {
  document.getElementById('app').innerHTML = `
    <div class="header">🔍 Google Search Skills</div>
    <div style="padding:5px;">
      <p style="font-size:1.1em; margin:10px 0; text-align:center;">👋 Learn to search like a pro!</p>
      <input type="text" id="nameInput" class="input-box" placeholder="Your name">
      <p style="margin:12px 0; font-weight:bold; color:#4285F4;">📊 Choose your level:</p>
      <select id="levelSelect">
        <option value="Beginner">⭐ Beginner (Basic operators)</option>
        <option value="Intermediate">⭐⭐ Intermediate (Combined searches)</option>
        <option value="Advanced">⭐⭐⭐ Advanced (Power searching)</option>
        <option value="Expert">🏆 Expert (Security & OSINT)</option>
      </select>
      <button class="btn btn-blue" onclick="startQuiz()" style="margin-top:15px;">▶️ START LEARNING</button>
      <p style="text-align:center; margin-top:10px; font-size:0.9em; color:#666;">🔍 Master Google search operators!</p>
    </div>
  `;
}

function startQuiz() {
  state.userName = document.getElementById('nameInput').value.trim();
  if (!state.userName) { alert('Please enter your name!'); return; }
  state.currentLevel = document.getElementById('levelSelect').value;
  state.questions = selectQuestions(state.currentLevel);
  state.currentIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.retryMode = false;
  renderGreeting();
}

function renderGreeting() {
  document.getElementById('app').innerHTML = `
    <div class="header">🔍 Google Search</div>
    <div class="header-purple">Level: ${state.currentLevel}</div>
    <div style="background:#F5E6FF; padding:18px; border-radius:20px; margin:12px 0;">
      <p>👋 Hi ${state.userName}!</p>
      <p>📝 <strong>10 questions</strong> about search operators</p>
      <p>📊 Level: <span class="badge badge-purple">${state.currentLevel}</span></p>
    </div>
    <button class="btn btn-orange" onclick="showQuestion()">👍 START!</button>
  `;
}

function showQuestion() {
  if (state.currentIndex >= state.questions.length) { showResults(); return; }
  const q = state.questions[state.currentIndex];
  state.questionStartTime = Date.now();
  state.selectedOption = '';
  const typeLabel = q.type === 'mo' ? '🔘 Multiple Choice' : q.type === 'tf' ? '✅ True/False' : '✏️ Type Answer';
  
  let optionsHtml = '';
  if (q.type === 'mo') {
    optionsHtml = q.options.map(opt => `<button class="option-btn" onclick="selectOption(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('');
  } else if (q.type === 'tf') {
    optionsHtml = `<button class="option-btn" onclick="selectOption(this, 'True')">✅ True</button><button class="option-btn" onclick="selectOption(this, 'False')">❌ False</button>`;
  } else {
    optionsHtml = `<input type="text" id="fillAnswer" class="input-box" placeholder="Type your answer" autocomplete="off">`;
  }
  
  document.getElementById('app').innerHTML = `
    <div class="header">🔍 Google Search</div>
    <div class="header-purple">Q${state.currentIndex+1}/10 • ${state.currentLevel}</div>
    <div class="timer">⏱️ <span id="liveTimer">0s</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((state.currentIndex)/10)*100}%"></div></div>
    <div class="question-box">
      <p style="color:#4285F4; font-weight:bold;">${typeLabel}</p>
      <p class="question-text">${q.text}</p>
      ${state.retryMode ? '<p style="color:#FF8C00;">🔄 Try once more!</p>' : ''}
      ${optionsHtml}
      <div id="feedbackArea"></div>
      <button class="btn btn-green" onclick="submitAnswer('${q.type}', '${q.answer.replace(/'/g, "\\'")}', ${q.id})">✅ SUBMIT</button>
      ${state.retryMode ? '<button class="btn" style="background:#666;" onclick="skipQuestion()">⏭️ SKIP</button>' : ''}
    </div>
  `;
  
  window.liveTimerInterval = setInterval(() => {
    const elapsed = Math.round((Date.now() - state.questionStartTime)/1000);
    const el = document.getElementById('liveTimer');
    if (el) el.textContent = elapsed + 's';
  }, 500);
}

function selectOption(btn, value) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.selectedOption = value;
}

function submitAnswer(type, correctAnswer, questionId) {
  if (window.liveTimerInterval) clearInterval(window.liveTimerInterval);
  const feedback = document.getElementById('feedbackArea');
  let userAnswer = '';
  if (type === 'fg') {
    userAnswer = document.getElementById('fillAnswer').value.trim();
    if (!userAnswer) { feedback.innerHTML = '<div class="feedback wrong">⚠️ Please type an answer!</div>'; return; }
  } else {
    if (!state.selectedOption) { feedback.innerHTML = '<div class="feedback wrong">⚠️ Please select an option!</div>'; return; }
    userAnswer = state.selectedOption;
  }
  
  const isCorrect = userAnswer.toLowerCase().trim() === correctAnswer.toLowerCase().trim();
  const q = state.questions[state.currentIndex];
  
  if (isCorrect) {
    feedback.innerHTML = '<div class="feedback correct">✅ CORRECT!</div>';
    state.answers.push({id: questionId, correct: true});
    state.retryMode = false;
    setTimeout(() => { state.currentIndex++; showQuestion(); }, 1000);
  } else {
    if (!state.retryMode) {
      feedback.innerHTML = '<div class="feedback wrong">❌ Not quite. Try again!</div>';
      state.retryMode = true;
      state.selectedOption = '';
      setTimeout(() => showQuestion(), 800);
    } else {
      feedback.innerHTML = `<div class="feedback wrong">❌ Answer: <strong>${correctAnswer}</strong></div><div class="learn">💡 ${q.explanation}</div>`;
      state.answers.push({id: questionId, correct: false});
      state.retryMode = false;
      setTimeout(() => { state.currentIndex++; showQuestion(); }, 2500);
    }
  }
}

function skipQuestion() {
  if (window.liveTimerInterval) clearInterval(window.liveTimerInterval);
  state.answers.push({id: state.questions[state.currentIndex].id, correct: false, skipped: true});
  state.retryMode = false;
  state.selectedOption = '';
  state.currentIndex++;
  showQuestion();
}

function showResults() {
  const correct = state.answers.filter(a => a.correct).length;
  const wrong = state.answers.filter(a => !a.correct).length;
  const percent = Math.round((correct/10)*100);
  const totalTime = Math.round((Date.now() - state.startTime)/1000);
  const min = Math.floor(totalTime/60);
  const sec = totalTime % 60;
  
  document.getElementById('app').innerHTML = `
    <div class="header">📊 Results</div>
    <div class="results">
      <p>${state.userName} • <span class="badge badge-purple">${state.currentLevel}</span></p>
      <div style="margin:15px 0;"><span class="big-number">${percent}%</span></div>
      <p>✅ Correct: <strong>${correct}</strong> | ❌ Wrong: <strong>${wrong}</strong></p>
      <p>⏱️ Time: <strong>${min}m ${sec}s</strong></p>
      <div style="max-width:200px; margin:15px auto;"><canvas id="pieChart"></canvas></div>
      <button class="btn btn-orange" onclick="retrySameLevel()">🔁 TRY AGAIN</button>
      <button class="btn" onclick="renderWelcome()">🔄 CHANGE LEVEL</button>
    </div>
  `;
  
  new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: { labels: ['Correct', 'Wrong'], datasets: [{ data: [correct, wrong], backgroundColor: ['#228B22', '#FF8C00'], borderColor: 'white', borderWidth: 2 }] },
    options: { plugins: { title: { display: true, text: 'Your Score', color: '#4285F4', font: {size: 14} } } }
  });
}

function retrySameLevel() {
  state.questions = selectQuestions(state.currentLevel);
  state.currentIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.retryMode = false;
  renderGreeting();
}

renderWelcome();
</script>
</body>
</html>
