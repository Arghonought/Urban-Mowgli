      background: #FF8C00;
      color: white;
      border-color: #800080;
      font-weight: bold;
    }

      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      font-size: 1em;

    .wrong { background: #FFB6C1; color: #8B0000; }

      text-align: center;
      padding: 15px;
    }

      font-size: 2.5em;
      font-weight: bold;
      color: #800080;
    }

      background: #FF8C00;
      color: white;

      font-weight: bold;

      font-weight: bold;
      color: #FF8C00;
      text-align: right;
      padding: 5px;

      border-radius: 10px;
      height: 10px;
      margin: 8px 0;
      overflow: hidden;
    }
    .progress-fill {
      background: #228B22;

      border-radius: 10px;
    }

      background: #FFF9E6;
      border-left: 4px solid #FF8C00;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      font-size: 0.95em;

    .topic-card {

      background: #EDE0F5;
    }

      {type:'mo', text:'What problem does BM25 address?', options:['Document length normalization','Color matching','Image processing','Video compression'], answer:'Document length normalization', explanation:'BM25 improves upon TF-IDF by accounting for document length.'},
      {type:'tf', text:'Neural ranking models outperform traditional methods', answer:'True', explanation:'Deep learning models better understand semantic relationships.'},
      {type:'fg', text:'___ retrieval combines sparse and dense representations', answer:'Hybrid', explanation:'Hybrid search uses both keyword matching and semantic embeddings.'},
      {type:'mo', text:'What is the key advantage of learned sparse retrieval?', options:['Combines efficiency with semantics','Only uses keywords','Ignores relevance','Requires more storage'], answer:'Combines efficiency with semantics', explanation:'It learns which terms are important while maintaining fast retrieval.'},
      {type:'tf', text:'Query expansion always improves search results', answer:'False', explanation:'Poor expansion can introduce irrelevant terms and reduce precision.'},
      {type:'fg', text:'___ metrics evaluate how well search results satisfy users', answer:'Relevance', explanation:'Relevance metrics like NDCG measure search quality.'},
      {type:'mo', text:'What is the purpose of learning to rank?', options:['Train models to order search results','Teach users to search','Rank websites by speed','Order files by size'], answer:'Train models to order search results', explanation:'LTR uses machine learning to optimize result ordering.'},
      {type:'tf', text:'Federated search queries multiple databases simultaneously', answer:'True', explanation:'Federated search aggregates results from different sources.'},
      {type:'fg', text:'___ embeddings represent words as dense vectors', answer:'Word', explanation:'Word embeddings capture semantic meaning in vector space.'},
      {type:'mo', text:'What is the vocabulary mismatch problem?', options:['Different words for same concept','Missing words in dictionary','Translation errors','Spelling mistakes'], answer:'Different words for same concept', explanation:'Users and authors may use different terms for the same thing.'},
      {type:'tf', text:'Query understanding systems parse natural language questions', answer:'True', explanation:'Modern search engines interpret questions, not just keywords.'},
      {type:'fg', text:'___ search allows finding information across multiple modalities', answer:'Multimodal', explanation:'Multimodal search handles text, images, and audio together.'},
    ]
  }
};

// ============================================
// APP STATE
// ============================================
let state = {
  userName: '',
  currentTopic: '',
  currentLevel: 'Beginner',
  questions: [],
  currentIndex: 0,
  answers: [],
  startTime: 0,
  questionStartTime: 0,
  retryMode: false,
  selectedOption: '',
  topicResults: {}, // track per-topic performance
};

// ============================================
// SCREEN RENDERERS
// ============================================
function renderWelcome() {
  const topics = Object.keys(QUESTION_BANK);
  let topicCards = topics.map(t => {
    const icons = {
      hardware: '🖥️', software: '💿', internalComponents: '🔧', 
      introAI: '🤖', prompting: '💬', internetSafety: '🛡️',
      internetPrivacy: '🔒', internetSearching: '🔍'
    };
    return `
      <div class="topic-card" onclick="selectTopic('${t}')" id="topic-${t}">
        <span class="topic-icon">${icons[t] || '📚'}</span>
        <strong>${formatTopicName(t)}</strong>
        <span style="float:right; color:#800080;">→</span>
      </div>
    `;
  }).join('');
  
  document.getElementById('app').innerHTML = `
    <div class="header">💻 Digital Skills Learning</div>
    <div style="padding:5px;">
      <p style="font-size:1.1em; margin:10px 0; text-align:center;">👋 Welcome! This quiz adapts to help you <strong>learn</strong>.</p>
      <input type="text" id="nameInput" class="input-box" placeholder="Your name">
      <p style="margin:12px 0; font-weight:bold; color:#800080;">📚 Choose a topic:</p>
      ${topicCards}
      <div id="levelSelection" class="hidden">
        <p style="margin:12px 0; font-weight:bold; color:#FF8C00;">📊 Starting level:</p>
        <select id="levelSelect">
          <option value="Beginner">⭐ Beginner</option>
          <option value="Intermediate">⭐⭐ Intermediate</option>
          <option value="Advanced">⭐⭐⭐ Advanced</option>
          <option value="Expert">🏆 Expert</option>
        </select>
      </div>
      <button class="btn btn-green" onclick="startQuiz()" id="startBtn" style="margin-top:15px;">▶️ START LEARNING</button>
      <p style="text-align:center; margin-top:10px; font-size:0.9em; color:#666;">
        🎯 Answer 5+ questions in under 40s to level up!<br>
        📖 Wrong answers include explanations to help you learn.
      </p>
    </div>
  `;
}

function selectTopic(topic) {
  state.currentTopic = topic;
  document.querySelectorAll('.topic-card').forEach(c => c.style.borderColor = 'transparent');
  const card = document.getElementById(`topic-${topic}`);
  if (card) card.style.borderColor = '#800080';
  document.getElementById('levelSelection').classList.remove('hidden');
}

function formatTopicName(key) {
  const names = {
    hardware: 'Computer Hardware',
    software: 'Software & Applications',
    internalComponents: 'Internal Components',
    introAI: 'Introduction to AI',
    prompting: 'AI Prompting Skills',
    internetSafety: 'Internet Safety',
    internetPrivacy: 'Internet Privacy',
    internetSearching: 'Internet Searching Skills'
  };
  return names[key] || key;
}

function startQuiz() {
  state.userName = document.getElementById('nameInput').value.trim();
  if (!state.userName) { alert('Please enter your name!'); return; }
  if (!state.currentTopic) { alert('Please select a topic!'); return; }
  
  state.currentLevel = document.getElementById('levelSelect').value;
  state.questions = selectQuestions(state.currentTopic, state.currentLevel);
  state.currentIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.retryMode = false;
  state.selectedOption = '';
  
  renderGreeting();
}

function selectQuestions(topic, level) {
  const bank = QUESTION_BANK[topic][level];
  const shuffled = [...bank].sort(() => Math.random() - 0.5);
  
  // Ensure mix: 3 tf, 2 fg, 5 mo
  const tf = shuffled.filter(q => q.type === 'tf').slice(0, 3);
  const fg = shuffled.filter(q => q.type === 'fg').slice(0, 2);
  const mo = shuffled.filter(q => q.type === 'mo').slice(0, 5);
  
  let selected = [...tf, ...fg, ...mo];
  // Fill remaining if needed
  if (selected.length < 10) {
    const remaining = shuffled.filter(q => !selected.includes(q));
    selected = [...selected, ...remaining].slice(0, 10);
  }
  
  return selected.sort(() => Math.random() - 0.5).map((q, i) => ({...q, id: i}));
}

function renderGreeting() {
  document.getElementById('app').innerHTML = `
    <div class="header">${formatTopicName(state.currentTopic)}</div>
    <div class="header-purple">Level: ${state.currentLevel}</div>
    <div style="background:#F5E6FF; padding:18px; border-radius:20px; margin:12px 0;">
      <p style="font-size:1.1em;">👋 Hi ${state.userName}!</p>
      <p style="margin-top:8px;">📝 <strong>10 questions</strong> about <strong>${formatTopicName(state.currentTopic)}</strong></p>
      <p>📊 Starting at <span class="badge badge-purple">${state.currentLevel}</span> level</p>
      <p style="margin-top:8px; font-size:0.9em;">🎯 Get <strong>5+ correct in under 40 seconds</strong> to advance!</p>
      <p style="font-size:0.9em;">📖 Each wrong answer includes an explanation.</p>
    </div>
    <button class="btn btn-orange" onclick="showQuestion()">👍 I'M READY!</button>
  `;
}

function showQuestion() {
  if (state.currentIndex >= state.questions.length) {
    showResults();
    return;
  }
  
  const q = state.questions[state.currentIndex];
  state.questionStartTime = Date.now();
  state.selectedOption = '';
  
  const typeLabel = q.type === 'mo' ? '🔘 Multiple Choice' : q.type === 'tf' ? '✅ True or False' : '✏️ Fill in the Blank';
  
  let optionsHtml = '';
  if (q.type === 'mo') {
    const allOpts = q.options ? [...q.options] : [q.answer, 'Not sure', 'Maybe', 'None'];
    if (!allOpts.includes(q.answer)) allOpts.push(q.answer);
    optionsHtml = [...new Set(allOpts)].sort(() => Math.random() - 0.5).map(opt =>
      `<button class="option-btn" onclick="selectOption(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`
    ).join('');
  } else if (q.type === 'tf') {
    optionsHtml = `
      <button class="option-btn" onclick="selectOption(this, 'True')">✅ True</button>
      <button class="option-btn" onclick="selectOption(this, 'False')">❌ False</button>
    `;
  } else {
    optionsHtml = `<input type="text" id="fillAnswer" class="input-box" placeholder="Type your answer here" autocomplete="off">`;
  }
  
  const retryMsg = state.retryMode ? '<p style="color:#FF8C00; font-weight:bold;">🔄 Try once more!</p>' : '';
  const timerHtml = `<div class="timer">⏱️ <span id="liveTimer">0s</span></div>`;
  
  document.getElementById('app').innerHTML = `
    <div class="header">${formatTopicName(state.currentTopic)}</div>
    <div class="header-purple">Q${state.currentIndex+1}/10 • ${state.currentLevel}</div>
    ${timerHtml}
    <div class="progress-bar"><div class="progress-fill" style="width:${((state.currentIndex)/10)*100}%"></div></div>
    <div class="question-box">
      <p style="color:#800080; font-weight:bold;">${typeLabel}</p>
      ${q.image ? `<img src="${q.image}" alt="question image" onerror="this.style.display='none'">` : ''}
      <p class="question-text">${q.text}</p>
      ${retryMsg}
      ${optionsHtml}
      <div id="feedbackArea"></div>
      <button class="btn btn-green" onclick="submitAnswer('${q.type}', '${q.answer.replace(/'/g, "\\'")}', ${q.id})" style="margin-top:12px;">✅ SUBMIT ANSWER</button>
      ${state.retryMode ? '<button class="btn" style="background:#666;" onclick="skipQuestion()">⏭️ SKIP</button>' : ''}
    </div>
  `;
  
  // Live timer
  let elapsed = 0;
  window.liveTimerInterval = setInterval(() => {
    elapsed = Math.round((Date.now() - state.questionStartTime) / 1000);
    const timerEl = document.getElementById('liveTimer');
    if (timerEl) timerEl.textContent = elapsed + 's';
  }, 500);
}

function selectOption(btn, value) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.selectedOption = value;
}

function submitAnswer(type, correctAnswer, questionId) {
  if (window.liveTimerInterval) clearInterval(window.liveTimerInterval);
  
  const feedback = document.getElementById('feedbackArea');
  let userAnswer = '';
  
  if (type === 'fg') {
    userAnswer = document.getElementById('fillAnswer').value.trim();
    if (!userAnswer) {
      feedback.innerHTML = '<div class="feedback wrong">⚠️ Please type an answer!</div>';
      return;
    }
  } else {
    if (!state.selectedOption) {
      feedback.innerHTML = '<div class="feedback wrong">⚠️ Please select an option!</div>';
      return;
    }
    userAnswer = state.selectedOption;
  }
  
  const isCorrect = userAnswer.toLowerCase().trim() === correctAnswer.toLowerCase().trim();
  const q = state.questions[state.currentIndex];
  const timeTaken = Math.round((Date.now() - state.questionStartTime) / 1000);
  
  if (isCorrect) {
    feedback.innerHTML = `<div class="feedback correct">✅ CORRECT! (${timeTaken}s)</div>`;
    state.answers.push({id: questionId, correct: true, time: timeTaken});
    state.retryMode = false;
    
    if (state.answers.filter(a => a.id === questionId && !a._retry).length === 0) {
      // First attempt correct
    }
    
    setTimeout(() => { state.currentIndex++; showQuestion(); }, 1200);
  } else {
    if (!state.retryMode) {
      feedback.innerHTML = `<div class="feedback wrong">❌ Not quite. Try again!</div>`;
      state.retryMode = true;
      state.selectedOption = '';
      setTimeout(() => showQuestion(), 800);
    } else {
      const explanationHtml = q.explanation ? 
        `<div class="explanation">💡 <strong>Learn:</strong> ${q.explanation}</div>` : '';
      feedback.innerHTML = `
        <div class="feedback wrong">❌ Incorrect. Answer: <strong>${correctAnswer}</strong></div>
        ${explanationHtml}
      `;
      state.answers.push({id: questionId, correct: false, time: timeTaken, _retry: true});
      state.retryMode = false;
      setTimeout(() => { state.currentIndex++; showQuestion(); }, 2500);
    }
  }
}

function skipQuestion() {
  if (window.liveTimerInterval) clearInterval(window.liveTimerInterval);
  const q = state.questions[state.currentIndex];
  state.answers.push({id: q.id, correct: false, time: 0, skipped: true});
  state.retryMode = false;
  state.selectedOption = '';
  state.currentIndex++;
  showQuestion();
}

function showResults() {
  const correct = state.answers.filter(a => a.correct).length;
  const wrong = state.answers.filter(a => !a.correct).length;
  const total = state.answers.length;
  const percent = total > 0 ? Math.round((correct/total)*100) : 0;
  const totalTime = Math.round((Date.now() - state.startTime) / 1000);
  const min = Math.floor(totalTime/60);
  const sec = totalTime % 60;
  
  // Determine if should level up
  const firstAttemptCorrect = state.answers.filter(a => a.correct && !a._retry).length;
  const isFastEnough = totalTime < 40;
  const shouldLevelUp = firstAttemptCorrect >= 5 && isFastEnough;
  
  let levelUpMsg = '';
  let nextAction = '';
  
  if (shouldLevelUp) {
    const levels = ['Beginner', 'Intermediate', 'Advanced', 'Expert'];
    const currentIdx = levels.indexOf(state.currentLevel);
    if (currentIdx < levels.length - 1) {
      const nextLevel = levels[currentIdx + 1];
      levelUpMsg = `
        <div style="background:#90EE90; padding:15px; border-radius:15px; margin:12px 0;">
          <p style="font-size:1.2em;">🎉 <strong>Great job!</strong></p>
          <p>You got <strong>${firstAttemptCorrect}+ correct in under 40s!</strong></p>
          <p>Advancing to: <span class="badge badge-green">${nextLevel}</span></p>
        </div>
      `;
      nextAction = `<button class="btn btn-green" onclick="advanceLevel('${nextLevel}')">🚀 TRY ${nextLevel.toUpperCase()} LEVEL</button>`;
    } else {
      levelUpMsg = `<div style="background:#90EE90; padding:15px; border-radius:15px; margin:12px 0;"><p>🏆 <strong>You're at Expert level!</strong> Amazing work!</p></div>`;
    }
  } else if (correct < 3) {
    const levels = ['Beginner', 'Intermediate', 'Advanced', 'Expert'];
    const currentIdx = levels.indexOf(state.currentLevel);
    if (currentIdx > 0) {
      const easierLevel = levels[currentIdx - 1];
      levelUpMsg = `
        <div style="background:#FFF3CD; padding:15px; border-radius:15px; margin:12px 0;">
          <p>📖 <strong>Let's build your foundation!</strong></p>
          <p>Try starting at an easier level to learn the basics.</p>
        </div>
      `;
      nextAction = `<button class="btn btn-orange" onclick="advanceLevel('${easierLevel}')">📚 PRACTICE AT ${easierLevel.toUpperCase()}</button>`;
    }
  }
  
  document.getElementById('app').innerHTML = `
    <div class="header">📊 Your Results</div>
    <div class="results">
      <p style="font-size:1.1em;">${state.userName} • ${formatTopicName(state.currentTopic)}</p>
      <p><span class="badge badge-purple">${state.currentLevel}</span></p>
      <div style="margin:15px 0;">
        <span class="big-number">${percent}%</span>
        <p>Correct</p>
      </div>
      <p>✅ Correct: <strong>${correct}</strong> | ❌ Wrong: <strong>${wrong}</strong></p>
      <p>⏱️ Total Time: <strong>${min}m ${sec}s</strong></p>
      ${levelUpMsg}
      <div style="max-width:200px; margin:15px auto;">
        <canvas id="pieChart"></canvas>
      </div>
      ${nextAction}
      <button class="btn" onclick="resetApp()">🔄 NEW TOPIC</button>
      <button class="btn btn-orange" onclick="retrySameLevel()">🔁 TRY AGAIN</button>
    </div>
  `;
  
  makePieChart(correct, wrong);
}

function advanceLevel(level) {
  state.currentLevel = level;
  state.questions = selectQuestions(state.currentTopic, state.currentLevel);
  state.currentIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.retryMode = false;
  renderGreeting();
}

function retrySameLevel() {
  state.questions = selectQuestions(state.currentTopic, state.currentLevel);
  state.currentIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.retryMode = false;
  renderGreeting();
}

function resetApp() {
  state = {
    userName: '',
    currentTopic: '',
    currentLevel: 'Beginner',
    questions: [],
    currentIndex: 0,
    answers: [],
    startTime: 0,
    questionStartTime: 0,
    retryMode: false,
    selectedOption: '',
    topicResults: {},
  };
  renderWelcome();
}

function makePieChart(correct, wrong) {
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  
  new Chart(canvas, {
    type: 'pie',
    data: {
      labels: ['Correct', 'Wrong'],
      datasets: [{
        data: [correct, wrong],
        backgroundColor: ['#228B22', '#FF8C00'],
        borderColor: 'white',
        borderWidth: 2
      }]
    },
    options: {
      plugins: {
        title: { display: true, text: 'Your Learning Score', color: '#800080', font: {size: 14} }
      }
    }
  });
}

// ============================================
// INIT
// ============================================
renderWelcome();
</script>
</body>
</html>
